# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: hosted-agent
metadata:
    template: azd-init@1.25.4
services:
    hosted-agent:
        project: .
        host: azure.ai.agent
        language: docker
        docker:
            platform: linux/amd64
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "0.25"
                    memory: 0.5Gi
            deployments:
                - model:
                    format: OpenAI
                    name: gpt-5.3-codex
                    version: "2026-02-24"
                  name: gpt-5.3-codex
                  sku:
                    capacity: 500
                    name: GlobalStandard
            startupCommand: python main.py
resources:
    hosted-agent:
        type: host.containerapp
        port: 80
